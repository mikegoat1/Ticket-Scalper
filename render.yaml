services:
  - type: web
    name: ticket-scalper
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ticket-scalper-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: SEATGEEK_CLIENT_ID
        sync: false
      - key: TICKETMASTER_API_KEY
        sync: false

databases:
  - name: ticket-scalper-db
    plan: free
    databaseName: ticket_scalper
